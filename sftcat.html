<!DOCTYPE html>
<html>
<head>
<title>Categories | DEVvault</title>
<link rel="stylesheet" href="sftcat1.css">

<style>
    body{
background-image: url("image18.jpg");
font-family:Arial;
color:white;
padding:40px;
}
nav a{/*for home, store , login*/
    color:white;
    margin-left:10px;
    margin-bottom: 50px;
    text-decoration:none;
    transition:1s;
    padding:10px 15px;
    border-radius: 30px;
    text-align:center;
    background:linear-gradient(135deg,#0d2d78,#067ad2);
    
}
nav a:hover{
    color:#0cb9f3;
    transition: 1s;
    transform:translateY(-5px);
    box-shadow:0 10px 50px rgba(253, 252, 252, 0.5);
}
h1{
text-align:center;
margin-bottom:20px;
margin-top: 60px;
text-decoration: underline;
font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:transparent;
padding:25px;
border-radius:15px;
transition:1s;
cursor:pointer;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 15px 35px rgba(251, 249, 249, 0.6);
}

</style>
</head>
<body>
    <nav>
<a href="home.html">Back to Home Page</a>
<a href="WebStore.html">Store</a>
<a href="login.html">Login</a>
</nav>
<h1>Software Categories</h1>

<div class="grid" id="categories"></div>
<div class="card">
<h3>Name.[cat.name]</h3>
<p>Description[Cat.Description]</p>
</div>
<script src="sftcat2.js"></script>
</body>
</html>
