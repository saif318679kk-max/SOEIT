<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Software Store - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login1.css">
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}
body{
    background-image: url("image18.jpg");
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.login-container{
    padding:40px;
    border-radius:20px;
    width:350px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
}
h2{
    margin-bottom:20px;
    color:#38bdf8;
    font-family: sans-serif;
    font-size: 30px;
    text-decoration: underline;
}
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:25px;
}
button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:linear-gradient(135deg,#38bdf8,#6366f1);
    border:none;
    border-radius:25px;
    text-decoration: underline;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition: 1s;
}
button:hover{
    opacity:0.9;
    transform: translatey(-5px);
    background: #3e6aa7;
}
a{
    display:block;
    padding: 5px 5px;
    margin-top:15px;
    margin-bottom: 15px;
    color:#06a4f4;
    text-decoration:none;
    border-radius: 25px;
    background-color: rgb(242, 239, 239);
    border-width: 30px;
    background-size: 20px;
    text-decoration: underline;
}
b{
    color: azure;
}
a{
    background:linear-gradient(135deg,#38bdf8,#6366f1);
    display:block;
    padding: 2px 2px;
    margin-top:5px;
    color:#f7f5f5;
    text-decoration:none;
    border-radius: 25px;
    border-width: 30px;
    text-decoration: underline;
}
</style>
</head>
<body>

<div class="login-container">
<h2>Login</h2>
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button onclick="login()"><b>Login</b></button>
<a href="home.html">Back to Home</a>
<b>Or</b>
<a href="register.html"><b>[Register Here]</b></a>
</div>
<script src="sabe.js"></script>
</body>
</html>
