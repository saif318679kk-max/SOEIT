<style>
    body{

}
nav a{/*for home, store , login*/
    color:white;
    margin-left:20px;
    text-decoration:none;
    transition:1s;
    padding:10px 15px;
    border-radius: 30px;
    text-align:center;

nav a:hover{

}
 h1{
    padding: 10px 20px;
    font-size:40px;

}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

}

.card{

padding:25px;

}

.card:hover{

box-shadow:0 15px 35px rgba(240, 237, 237, 0.6);
}

button{

border-radius:30px;

}
